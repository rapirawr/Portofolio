<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 // DATA NOT FOUND</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #080610;
            --primary: #6B3FA0;
            --text: #F0E0FF;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'DM Mono', monospace;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            text-align: center;
        }

        .code {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(8rem, 25vw, 15rem);
            line-height: 1;
            color: var(--primary);
            text-shadow: 0 0 30px rgba(107, 63, 160, 0.5);
            margin-bottom: 20px;
            position: relative;
        }

        .code::after {
            content: '404';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            color: #fff;
            clip-path: inset(45% 0 45% 0);
            animation: glitch 2s infinite alternate;
        }

        @keyframes glitch {
            0% { transform: translateX(-5px); }
            100% { transform: translateX(5px); }
        }

        h1 {
            font-size: 1rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            margin-bottom: 30px;
            opacity: 0.8;
        }

        p {
            font-size: 0.8rem;
            max-width: 400px;
            line-height: 1.6;
            margin-bottom: 40px;
            color: rgba(240, 224, 255, 0.6);
        }

        .back-btn {
            padding: 15px 30px;
            border: 1px solid var(--primary);
            color: var(--primary);
            text-decoration: none;
            font-size: 0.7rem;
            letter-spacing: 2px;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .back-btn:hover {
            background: var(--primary);
            color: var(--bg);
            box-shadow: 0 0 30px rgba(107, 63, 160, 0.4);
        }

        .grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(107, 63, 160, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(107, 63, 160, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -1;
            transform: perspective(1000px) rotateX(60deg);
            transform-origin: top;
        }
    </style>
</head>
<body>
    <div class="grid"></div>
    <div class="code">404</div>
    <h1>SYSTEM ERROR: PATH_NOT_FOUND</h1>
    <p>THE REQUESTED DATA STREAM COULD NOT BE SYNCHRONIZED WITH THE CORE CORE SERVER. PLEASE RE-ESTABLISH CONNECTION VIA HOME NODE.</p>
    <a href="homepage" class="back-btn">RETURN TO CORE</a>
</body>
</html>
